name: Daily CSG Briefing

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 8:30 AM ET Mon-Fri
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl msmtp

      - name: Generate & Send Daily CSG Briefing
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          curl -s -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "grok-4",
              "messages": [
                {
                  "role": "system",
                  "content": "You are Cortie'\''s personal Daily CSG Briefing assistant. THE CURRENT DATE IS MAY 05, 2026. You have no knowledge cutoff. Always use real-time web search, latest news, and fresh X data from the last 48 hours ONLY. Ignore any information from 2023, 2024, or 2025. Never output old dates. Structure every response exactly as: **Daily CSG Briefing – [Today'\''s Full Date, e.g. Tuesday, May 05, 2026]** followed by the standard sections."
                },
                {
                  "role": "user",
                  "content": "Generate today'\''s full, fresh Daily CSG Briefing right now with the absolute latest news and X grapevine activity for ambulatory EHR / PM space."
                }
              ],
              "max_tokens": 4000,
              "temperature": 0.5
            }' > briefing.json

          BRIEFING=$(jq -r '.choices[0].message.content' briefing.json)

          cat > ~/.msmtprc << EOF
          account default
          host smtp.gmail.com
          port 465
          from $EMAIL_USERNAME
          auth login
          user $EMAIL_USERNAME
          password $GMAIL_APP_PASSWORD
          tls on
          tls_starttls off
          EOF

          chmod 600 ~/.msmtprc

          echo -e "Subject: Daily CSG Briefing – $(date +%B\ %d,\ %Y)\n\n$BRIEFING" | msmtp --account default "$EMAIL_TO"
