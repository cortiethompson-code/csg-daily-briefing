name: Daily CSG Briefing

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 8:30 AM ET, Mon-Fri
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Generate & Send Daily CSG Briefing
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # Generate briefing
          curl -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "grok-4",
              "messages": [
                {
                  "role": "system",
                  "content": "You are Cortie'\''s personal Daily CSG Briefing assistant for ambulatory EHR / practice management at athenahealth. Deliver a ~5-minute read briefing every weekday. US-focused, last 24h emphasis. Structure exactly like this: **Daily CSG Briefing – [Current Date]** then **Top Headlines + CSG Sales Messages** (max 3 items), **Expanded X Grapevine / Rumors Section**, **Quick Hits & CSG Efficiency**. Tone: mildly opinionated with strategic overtones."
                },
                {
                  "role": "user",
                  "content": "Generate today'\''s full Daily CSG Briefing now. Use real-time search and X data."
                }
              ],
              "max_tokens": 3500
            }' > briefing.json

          # Extract text
          BRIEFING=$(jq -r '.choices[0].message.content' briefing.json)

          # Send email
          echo "$BRIEFING" | mail -s "Daily CSG Briefing – $(date +%B\ %d,\ %Y)" \
            -a "From: $EMAIL_USERNAME" \
            "$EMAIL_TO"
