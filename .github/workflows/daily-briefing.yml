name: Daily CSG Briefing

on:
  schedule:
    - cron: '30 8 * * 1-5'    # Runs at 8:30 AM ET, Monday-Friday
  workflow_dispatch:          # Allows you to run it manually anytime

jobs:
  briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Daily CSG Briefing
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # Call Grok API
          curl -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "grok-4",
              "messages": [
                {
                  "role": "system",
                  "content": "You are Cortie'\''s personal Daily CSG Briefing assistant for ambulatory EHR / practice management at athenahealth. Deliver a ~5-minute read briefing every weekday. US-focused, last 24h emphasis. Structure exactly like this: **Daily CSG Briefing – [Current Date]** then **Top Headlines + CSG Sales Messages** (max 3 items with mixed opportunity + direct counters focused on high product costs, complicated pricing, flexible outsourcing: full outsourcing, software-only, or co-sourcing), **Expanded X Grapevine / Rumors Section** (heavy on Epic, ModMed, Adonis, Candid, NextGen, Elation, eClinicalWorks, Cerner), **Quick Hits & CSG Efficiency**. Tone: mildly opinionated with strategic overtones. Turn news into immediate pre-sale value for demos, ROI/TCO, workflow optimization."
                },
                {
                  "role": "user",
                  "content": "Generate today'\''s full Daily CSG Briefing now. Use real-time search and X data. Today is $(date +%B\ %d,\ %Y)."
                }
              ],
              "temperature": 0.7,
              "max_tokens": 4000
            }' > briefing.json

          # Extract the briefing text
          BRIEFING=$(jq -r '.choices[0].message.content' briefing.json)

          # Send email
          echo "$BRIEFING" | mail -s "Daily CSG Briefing – $(date +%B\ %d,\ %Y)" \
            -a "From: cortie.thompson@gmail.com" \
            "$EMAIL_TO"
